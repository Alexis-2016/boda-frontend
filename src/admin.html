<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Panel de Gestión</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        padding: 20px;
        background: #f5f5f5;
      }
      h1 {
        text-align: center;
      }
      .foto-card {
        background: white;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 20px;
        display: flex;
        gap: 15px;
        align-items: center;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      img {
        width: 150px;
        border-radius: 10px;
      }
      button {
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
      }
      .aprobar {
        background: #4caf50;
        color: white;
      }
      .rechazar {
        background: #e53935;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>Panel de Gestión</h1>

    <div id="login">
      <h2>Introduce PIN</h2>
      <input type="password" id="pin" placeholder="PIN" />
      <button id="btnLogin">Entrar</button>
    </div>

    <div id="panel" style="display: none">
      <h2>Fotos subidas</h2>
      <div id="lista-fotos"></div>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
